{% extends "base.html" %}
{% block content %}
<div class="mb-4">
    <h3>Archived Tasks</h3>
    <p class="text-muted">Completed or removed tasks stored in the XML archive.</p>
</div>

<div class="row">
    {% if not tasks %}
    <div class="col-12">
        <div class="alert alert-info">No archived tasks found.</div>
    </div>
    {% endif %}
    {% for task in tasks %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 border-secondary">
            <div class="card-body">
                <h5 class="card-title text-muted">{{ task.title }}</h5>
                <p class="card-text text-muted">{{ task.description }}</p>
                <div class="d-grid">
                    <a href="{{ url_for('restore_task', task_id=task.id) }}" class="btn btn-outline-success btn-sm">Restore to Active</a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
