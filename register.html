<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - To-Do App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        /* OPTIMIZATION: Unified input styling with consistent width/padding */
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        /* Password field container for eye toggle button */
        .password-field-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .password-field-wrapper input[type="password"],
        .password-field-wrapper input[type="text"] {
            width: 100%;
            padding-right: 40px;
        }

        /* Eye icon button styling */
        .eye-toggle-btn {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            transition: color 0.2s;
        }

        .eye-toggle-btn:hover {
            color: #764ba2;
        }

        /* SVG icon sizing */
        .eye-toggle-btn svg {
            width: 18px;
            height: 18px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .link-section {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .link-section a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .link-section a:hover {
            text-decoration: underline;
        }

        /* Message/notification styling */
        #message {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        #message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        #message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        /* Password strength requirements checker */
        .password-requirements {
            margin-top: 10px;
            padding: 10px;
            background-color: #f9f9f9;
            border-left: 3px solid #667eea;
            font-size: 12px;
            color: #666;
        }

        .password-requirements ul {
            margin-left: 20px;
            margin-top: 5px;
        }

        .requirement {
            margin: 3px 0;
        }

        .requirement.met {
            color: #28a745;
        }

        .requirement.unmet {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Account</h1>
        <div id="message"></div>
        
        <form id="registerForm">
            <input type="hidden" id="csrf_token" name="csrf_token" value="">
            
            <div class="form-group">
                <label for="username">Username:</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Choose a username" 
                    required
                    minlength="3"
                    maxlength="50"
                >
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <div class="password-field-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter password" 
                        required
                        minlength="8"
                    >
                    <!-- Eye toggle button - SVG icon for show/hide password -->
                    <button type="button" class="eye-toggle-btn" data-target="password" title="Show/Hide password">
                        <svg id="eye-icon-password" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
                <!-- Password strength requirements display -->
                <div class="password-requirements">
                    <strong>Password must have:</strong>
                    <ul>
                        <li class="requirement unmet" id="req-length">At least 8 characters</li>
                        <li class="requirement unmet" id="req-uppercase">Uppercase letter (A-Z)</li>
                        <li class="requirement unmet" id="req-number">Number (0-9)</li>
                        <li class="requirement unmet" id="req-special">Special character (!@#$%^&* etc)</li>
                    </ul>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password:</label>
                <div class="password-field-wrapper">
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirm_password" 
                        placeholder="Confirm password" 
                        required
                    >
                    <!-- Eye toggle button for confirm password -->
                    <button type="button" class="eye-toggle-btn" data-target="confirmPassword" title="Show/Hide password">
                        <svg id="eye-icon-confirmPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit">Register</button>
        </form>

        <div class="link-section">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        // Password validation requirements configuration
        const PASSWORD_REQUIREMENTS = {
            length: 8,
            uppercase: true,
            number: true,
            special: true
        };

        /**
         * Initialize CSRF token by fetching from server
         * SECURITY: Ensures all forms have a valid CSRF token to prevent cross-site attacks
         */
        function initializeCSRF() {
            fetch('get_csrf_token.php')
                .then(response => response.json())
                .then(data => {
                    if (data.token) {
                        document.getElementById('csrf_token').value = data.token;
                    }
                })
                .catch(error => console.error('Failed to get CSRF token:', error));
        }

        /**
         * Toggle password visibility - shows/hides password text
         * OPTIMIZATION: Uses event delegation for cleaner code
         */
        function setupPasswordToggle() {
            // Get all eye toggle buttons
            const eyeToggleButtons = document.querySelectorAll('.eye-toggle-btn');
            
            eyeToggleButtons.forEach(button => {
                button.addEventListener('click', function(e) {
                    e.preventDefault(); // Prevent form submission
                    
                    const targetId = this.dataset.target;
                    const inputField = document.getElementById(targetId);
                    const iconElement = document.getElementById('eye-icon-' + targetId);
                    
                    // Toggle between password and text input types
                    if (inputField.type === 'password') {
                        inputField.type = 'text';
                        // Change eye icon to indicate password is visible (eye-slash icon would be used in production)
                        iconElement.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
                    } else {
                        inputField.type = 'password';
                        // Change back to regular eye icon
                        iconElement.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
                    }
                });
            });
        }

        // Real-time password validation as user types
        const passwordInput = document.getElementById('password');
        passwordInput.addEventListener('input', function() {
            validatePassword(this.value);
        });

        /**
         * Validate password strength in real-time
         * Updates UI to show which requirements are met
         */
        function validatePassword(password) {
            const checks = {
                'req-length': password.length >= PASSWORD_REQUIREMENTS.length,
                'req-uppercase': /[A-Z]/.test(password),
                'req-number': /[0-9]/.test(password),
                'req-special': /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)
            };

            // Update UI for each requirement
            for (const [id, passed] of Object.entries(checks)) {
                const element = document.getElementById(id);
                if (passed) {
                    element.classList.remove('unmet');
                    element.classList.add('met');
                    element.textContent = '✓ ' + element.textContent.replace('✓ ', '');
                } else {
                    element.classList.remove('met');
                    element.classList.add('unmet');
                    element.textContent = element.textContent.replace('✓ ', '');
                }
            }
        }

        // Form submission handler
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const csrfToken = document.getElementById('csrf_token').value;
            const messageDiv = document.getElementById('message');

            // Client-side validation - verify all requirements
            if (username.length < 3) {
                showMessage('Username must be at least 3 characters long', 'error');
                return;
            }

            if (password.length < 8) {
                showMessage('Password must be at least 8 characters long', 'error');
                return;
            }

            if (!/[A-Z]/.test(password)) {
                showMessage('Password must contain an uppercase letter', 'error');
                return;
            }

            if (!/[0-9]/.test(password)) {
                showMessage('Password must contain a number', 'error');
                return;
            }

            if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) {
                showMessage('Password must contain a special character', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            if (!csrfToken) {
                showMessage('Security token missing. Please refresh the page.', 'error');
                return;
            }

            // Prepare form data for POST request
            const formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);
            formData.append('confirm_password', confirmPassword);
            formData.append('csrf_token', csrfToken);

            // Disable button to prevent double submission
            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Registering...';

            // Send registration request to server
            fetch('register.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMessage('Registration successful! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showMessage(data.error || 'Registration failed', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Register';
                    initializeCSRF(); // Refresh CSRF token on error
                }
            })
            .catch(error => {
                showMessage('An error occurred. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
                initializeCSRF(); // Refresh CSRF token on error
                console.error('Error:', error);
            });
        });

        /**
         * Display message to user (success or error)
         */
        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = type;
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            initializeCSRF();        // Get CSRF token from server
            setupPasswordToggle();   // Setup eye toggle buttons
        });
    </script>
</body>
</html>
