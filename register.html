<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - To-Do App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        /* Unified input styling with consistent width/padding */
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        /* Password field container for eye toggle button positioning */
        .password-container {
            position: relative;
        }

        .password-container input {
            width: 100%;
            padding-right: 40px; /* Space for icon */
            box-sizing: border-box;
        }

        /* Password toggle button - positioned absolutely inside container */
        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            transition: color 0.2s ease;
        }

        .password-toggle:hover {
            color: #764ba2;
        }

        /* SVG icon sizing within toggle button */
        .password-toggle svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
        }

        /* SVG visibility toggle - first SVG shows by default, second shows when .show class added */
        .password-toggle svg:first-of-type {
            display: block;
        }

        .password-toggle svg:last-of-type {
            display: none;
        }

        .password-toggle.show svg:first-of-type {
            display: none;
        }

        .password-toggle.show svg:last-of-type {
            display: block;
        }


        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .link-section {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .link-section a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .link-section a:hover {
            text-decoration: underline;
        }

        /* Message/notification styling */
        #message {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        #message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        #message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        /* Password strength requirements display with real-time feedback */
        .password-requirements {
            margin-top: 10px;
            padding: 10px;
            background-color: #f9f9f9;
            border-left: 3px solid #667eea;
            font-size: 12px;
            color: #666;
        }

        .password-requirements ul {
            margin-left: 20px;
            margin-top: 5px;
        }

        .requirement {
            margin: 3px 0;
        }

        .requirement.met {
            color: #28a745;
        }

        .requirement.unmet {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Account</h1>
        <div id="message"></div>
        
        <form id="registerForm">
            <!-- SECURITY: Hidden CSRF token to prevent cross-site attacks -->
            <!-- Generated on page load for ALL accounts (admin and non-admin) -->
            <input type="hidden" id="csrf_token" name="csrf_token" value="">
            
            <div class="form-group">
                <label for="username">Username:</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Choose a username" 
                    required
                    minlength="3"
                    maxlength="50"
                >
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <div class="password-container">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter password" 
                        required
                        minlength="8"
                    >
                    <!-- Password toggle button - SVG icon for show/hide -->
                    <button type="button" class="password-toggle" data-target="password" title="Show/Hide password">
                        <!-- Show password (open eye) - initially visible -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <!-- Hide password (closed eye with slash) - initially hidden -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.86 21.86 0 0 1 5.06-6.94M9.88 9.88A3 3 0 0 0 12 15a3 3 0 0 0 2.12-5.12"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
                <!-- Password strength requirements display with real-time feedback -->
                <div class="password-requirements">
                    <strong>Password must have:</strong>
                    <ul>
                        <li class="requirement unmet" id="req-length">At least 8 characters</li>
                        <li class="requirement unmet" id="req-uppercase">Uppercase letter (A-Z)</li>
                        <li class="requirement unmet" id="req-number">Number (0-9)</li>
                        <li class="requirement unmet" id="req-special">Special character (!@#$%^&* etc)</li>
                    </ul>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password:</label>
                <div class="password-container">
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirm_password" 
                        placeholder="Confirm password" 
                        required
                    >
                    <!-- Password toggle button for confirm field -->
                    <button type="button" class="password-toggle" data-target="confirmPassword" title="Show/Hide password">
                        <!-- Show password (open eye) - initially visible -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <!-- Hide password (closed eye with slash) - initially hidden -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.86 21.86 0 0 1 5.06-6.94M9.88 9.88A3 3 0 0 0 12 15a3 3 0 0 0 2.12-5.12"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit">Register</button>
        </form>

        <div class="link-section">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
