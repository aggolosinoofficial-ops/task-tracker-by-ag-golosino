{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>My Tasks</h3>
    <a href="{{ url_for('add_task_view') }}" class="btn btn-primary">Add New Task</a>
</div>

<div class="card p-3 mb-4">
    <div class="row g-2">
        <div class="col-md-6">
            <input type="text" id="liveSearch" class="form-control" placeholder="Search tasks...">
        </div>
        <div class="col-md-3">
            <select id="filterPriority" class="form-select">
                <option value="">All Priorities</option>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>
        </div>
        <div class="col-md-3">
            <select id="filterStatus" class="form-select">
                <option value="">All Statuses</option>
                <option value="pending">Pending</option>
                <option value="completed">Completed</option>
            </select>
        </div>
    </div>
</div>

<div id="taskContainer" class="row">
    {% for task in tasks %}
    <div class="col-md-4 mb-4 task-card" data-title="{{ task.title.lower() }}" data-description="{{ task.description.lower() }}" data-priority="{{ task.priority }}" data-status="{{ task.status }}">
        <div class="card h-100">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <h5 class="card-title">{{ task.title }}</h5>
                    <span class="badge {{ 'bg-danger' if task.priority == 'High' else 'bg-info' }}">{{ task.priority }}</span>
                </div>
                <p class="card-text text-muted">{{ task.description }}</p>
                <small class="d-block mb-2">Due: {{ task.due_date }}</small>
                <div class="btn-group w-100">
                    <a href="{{ url_for('archive_task', task_id=task.id) }}" class="btn btn-outline-secondary btn-sm">Archive</a>
                    <button class="btn btn-outline-primary btn-sm">Edit</button>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script>
document.getElementById('liveSearch').addEventListener('input', function(e) {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('.task-card').forEach(card => {
        const title = card.dataset.title;
        const desc = card.dataset.description;
        card.style.display = (title.includes(q) || desc.includes(q)) ? 'block' : 'none';
    });
});
</script>
{% endblock %}
