{% extends "base.html" %}
{% block content %}
<div class="mb-4">
    <h3>System Activity Logs</h3>
    <p class="text-muted">Security auditing from activity_logs.xml</p>
</div>

<div class="card">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Timestamp</th>
                    <th>User</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td><code class="text-dark">{{ log.timestamp }}</code></td>
                    <td><span class="badge bg-secondary">{{ log.user }}</span></td>
                    <td>{{ log.action }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
