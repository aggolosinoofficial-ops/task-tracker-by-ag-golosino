{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Archive</h2>
        <span class="text-muted">{{ tasks|length }} archived items</span>
    </div>

    <!-- Container for notifications -->
    <div id="notificationContainer"></div>

    <div id="archiveList" class="cards-container">
        {% if not tasks %}
        <div class="empty-state text-center py-5 w-100">
            <div class="display-1 text-muted mb-3">📦</div>
            <p class="text-muted fs-5">Your archive is empty.</p>
            <a href="{{ url_for('tasks') }}" class="btn btn-primary">Back to Tasks</a>
        </div>
        {% else %}
            {% for task in tasks %}
            <div class="card completed" data-task-id="{{ task.id }}">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title mb-0">{{ task.title }}</h5>
                        <span class="badge bg-secondary">{{ task.priority }}</span>
                    </div>
                    <p class="card-text text-muted small">{{ task.description }}</p>
                    <div class="card-actions mt-3">
                        <!-- The 'restore' action is handled by handleTaskListClick in script.js -->
                        <button class="btn btn-outline-success btn-sm w-100" data-action="restore" data-task-id="{{ task.id }}">
                            Restore to Tasks
                        </button>
                    </div>
                </div>
            </div>
            {% endfor %}
        {% endif %}
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
<script>
    // Manually initialize the click handler for the archive list 
    // because loadTasks() only targets #taskList
    const archiveList = document.getElementById('archiveList');
    if (archiveList) {
        archiveList.addEventListener('click', handleTaskListClick);
    }
</script>
{% endblock %}
