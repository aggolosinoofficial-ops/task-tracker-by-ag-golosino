{% extends "base.html" %}
{% block content %}
<div class="dashboard-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Task Tracker</h1>
        <div>
            <input type="text" id="taskInput" class="form-control d-inline-block w-auto" placeholder="Quick task title...">
            <button class="btn btn-primary" onclick="quickAddTask()">Add Task</button>
        </div>
    </div>
    <div class="task-list-wrapper">
        <div id="taskList" class="cards-container">
            <!-- Tasks will be loaded by script.js -->
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
{% endblock %}
