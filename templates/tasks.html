{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='task.css') }}">
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">All Tasks</h2>
        <a href="{{ url_for('add_task_view') }}" class="btn btn-primary">
            <span class="me-2">➕</span>Add New Task
        </a>
        <!-- New Bulk Action Button -->
        <button type="button" class="btn btn-outline-secondary ms-2" onclick="clearCompletedTasks()">
            <span class="me-2">🧹</span>Clear Completed
        </button>
    </div>

    <!-- Client-side Search Bar -->
    <div class="row mb-4 g-2">
        <div class="col-md-8">
            <div class="input-group shadow-sm">
                <span class="input-group-text bg-white border-end-0">🔍</span>
                <input type="text" id="taskSearchInput" class="form-control border-start-0 ps-1" placeholder="Search tasks by title or description..." onkeyup="applyFilters()">
            </div>
        </div>
        <div class="col-md-4">
            <div class="input-group shadow-sm">
                <span class="input-group-text bg-white border-end-0">🎯</span>
                <select id="priorityFilter" class="form-select border-start-0 text-muted" onchange="applyFilters()" title="Filter tasks by priority">
                    <option value="All">All Priorities</option>
                    <option value="High">High Priority</option>
                    <option value="Medium">Medium Priority</option>
                    <option value="Low">Low Priority</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Required for notifications from script.js -->
    <div id="notificationContainer"></div>
    
    <!-- Required for loading state in script.js -->
    <div id="loading" class="text-center my-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading tasks...</span>
        </div>
    </div>

    <!-- Required for dynamic task injection -->
    <div class="task-list-wrapper">
        <div id="taskList" class="cards-container"></div>
    </div>

    <!-- Edit Task Modal -->
    <div class="modal fade" id="editTaskModal" tabindex="-1" aria-labelledby="editTaskModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editTaskModalLabel">Edit Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="editTaskForm">
                    <div class="modal-body">
                        <input type="hidden" id="editTaskId">
                        <div class="mb-3">
                            <label for="editTitle" class="form-label">Title</label>
                            <input type="text" class="form-control" id="editTitle" required>
                        </div>
                        <div class="mb-3">
                            <label for="editDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="editDescription" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="editPriority" class="form-label">Priority</label>
                            <select class="form-select" id="editPriority">
                                <option value="High">High</option>
                                <option value="Medium">Medium</option>
                                <option value="Low">Low</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="editDueDate" class="form-label">Due Date</label>
                            <input type="date" class="form-control" id="editDueDate">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
